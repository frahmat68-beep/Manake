version: '3.9'

services:
  app:
    build:
      context: .
      target: app
    image: manake-rental:latest
    container_name: manake-app
    depends_on:
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      QUEUE_CONNECTION: database
      REDIS_HOST: redis
    volumes:
      - ./:/var/www/html

  queue:
    image: manake-rental:latest
    container_name: manake-queue
    depends_on:
      - app
    env_file:
      - .env
    environment:
      QUEUE_CONNECTION: database
    command: ["php", "artisan", "queue:work", "--queue=default", "--sleep=1", "--tries=3", "--timeout=120"]
    volumes:
      - ./:/var/www/html

  scheduler:
    image: manake-rental:latest
    container_name: manake-scheduler
    depends_on:
      - app
    env_file:
      - .env
    environment:
      QUEUE_CONNECTION: database
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ./:/var/www/html

  mysql:
    image: mysql:8.0
    container_name: manake-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: manake_db
      MYSQL_USER: manake
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: manake-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data:
